services:
  # OAuth2 Proxy - handles Google authentication
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    ports:
      - "4180:4180"
    environment:
      # Google OAuth settings (get from Google Cloud Console)
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Restrict to your domain only
      OAUTH2_PROXY_EMAIL_DOMAINS: gianlucaformica.net

      # Cookie settings
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "false"  # Set to true in production with HTTPS
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy

      # Proxy settings - route /api/* to API, everything else to web frontend
      OAUTH2_PROXY_UPSTREAMS: http://host.docker.internal:3001/api/,http://host.docker.internal:3000/
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REDIRECT_URL: http://localhost:4180/oauth2/callback

      # Pass user info to upstream
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"

      # Skip auth for health check
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: ^/health$

      # Allow requests from web frontend
      OAUTH2_PROXY_WHITELIST_DOMAINS: localhost:3000
      OAUTH2_PROXY_COOKIE_DOMAINS: localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Optional: Redis for session storage (recommended for production)
  # redis:
  #   image: redis:7-alpine
  #   container_name: oauth2-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped
